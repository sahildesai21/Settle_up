name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyAh_CWq4m6JcASS01WHcxraRxtCVFe9I2M"
          VITE_FIREBASE_AUTH_DOMAIN: "settleup-59477.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "settleup-59477"
          VITE_FIREBASE_STORAGE_BUCKET: "settleup-59477.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "791223285125"
          VITE_FIREBASE_APP_ID: "1:791223285125:web:b88cc05a562bb89095c0ec"
          VITE_FIREBASE_MEASUREMENT_ID: "G-LP7SF0WZ4Y"
          VITE_EMAILJS_PUBLIC_KEY: "tEfsVQr1Yupl4KlIT"
          VITE_EMAILJS_SERVICE_ID: "service_4kmducf"
          VITE_EMAILJS_TEMPLATE_ID: "template_qr6xlmb"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
