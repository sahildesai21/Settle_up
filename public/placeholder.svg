<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" fill="none">
  <rect width="1200" height="1200" fill="#F9FAFB" rx="3"/>
  <defs>
    <linearGradient id="walletGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5DD5C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Gradient circle background -->
  <circle cx="600" cy="550" r="220" fill="url(#walletGradient)" opacity="0.15"/>
  <circle cx="600" cy="550" r="180" fill="url(#walletGradient)" opacity="0.2"/>
  
  <!-- Wallet icon -->
  <g transform="translate(480, 460)">
    <!-- Main wallet body -->
    <rect x="8" y="24" width="224" height="176" rx="16" stroke="url(#walletGradient)" stroke-width="12" fill="none"/>
    <!-- Top flap -->
    <path d="M 40 24 L 40 12 C 40 6 44 2 50 2 L 190 2 C 196 2 200 6 200 12 L 200 24" stroke="url(#walletGradient)" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Card lines -->
    <line x1="48" y1="80" x2="128" y2="80" stroke="url(#walletGradient)" stroke-width="10" stroke-linecap="round"/>
    <line x1="48" y1="112" x2="160" y2="112" stroke="url(#walletGradient)" stroke-width="10" stroke-linecap="round"/>
    <!-- Circle button -->
    <circle cx="192" cy="140" r="18" fill="url(#walletGradient)" opacity="0.9"/>
  </g>
  
  <text x="600" y="760" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="600" fill="url(#walletGradient)" text-anchor="middle">SettleUp</text>
</svg>